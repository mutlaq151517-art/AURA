<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#061a2f;
  color:white;
  padding-bottom:100px;
}

/* ===== Intro Animation (المضاف فقط) ===== */
#introScreen{
  position:fixed;
  inset:0;
  background:#061a2f;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
  animation:fadeOut 1s ease 3s forwards;
}

.intro-wrapper{
  text-align:center;
  animation:popIn 1.6s ease forwards;
}

.intro-logo-img{
  width:150px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 40px rgba(0,210,165,.6));
}

.intro-text{
  font-size:40px;
  font-weight:bold;
  letter-spacing:6px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff,#ff3b8d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(0,210,165,.7));
}

@keyframes popIn{
  0%{opacity:0;transform:scale(.6);}
  60%{opacity:1;transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}
/* ===== نهاية الإضافة ===== */


/* ===== Header ثابت ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  background:rgba(8,25,45,.95);
  backdrop-filter:blur(12px);
  z-index:2000;
}

.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.search-box{
  position:relative;
}

.search-box input{
  width:100%;
  padding:13px 45px 13px 15px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:14px;
  background:white;
  color:#000;
}

.search-box span{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#666;
}

.content{
  padding:120px 20px 20px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}
.card-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  font-size:13px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.series-page{display:none;padding-top:120px}

.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
}

.episode-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.episode-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.play-circle{
  position:absolute;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #00d2a5;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.episode-duration{
  position:absolute;
  bottom:30px;
  left:95px;
  font-size:18px;
  font-weight:bold;
}

.episode-number{
  position:absolute;
  bottom:25px;
  right:25px;
  font-size:26px;
  font-weight:bold;
}

.badge{
  position:absolute;
  top:15px;
  left:15px;
  padding:6px 12px;
  border-radius:15px;
  font-size:12px;
}
.badge-locked{ background:#ff3b3b; }
.badge-free{ background:#00d2a5; }

#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:rgba(15,35,60,.95);
  backdrop-filter:blur(15px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:3000;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:18px;
  color:#00d2a5;
  cursor:pointer;
}
.nav-item span{
  font-size:11px;
  margin-top:4px;
}
</style>
</head>

<body>

<!-- ===== Intro Screen ===== -->
<div id="introScreen">
  <div class="intro-wrapper">
    <img src="logo.png" class="intro-logo-img">
    <div class="intro-text">AURAVO</div>
  </div>
</div>

<div class="header">
  <div class="logo">AURA</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مسلسلك...">
    <span>🔎</span>
  </div>
</div>

<div id="homeContent" class="content">
  <div class="grid" id="seriesGrid"></div>
</div>

<div class="series-page" id="seriesPage">
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <div id="playerHeader">
    <div>AURA PLAYER</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls style="display:none"></video>
  <iframe id="auraFrame" allowfullscreen style="display:none"></iframe>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item" onclick="window.location.href='/settings.html'">⚙️<span>الإعدادات</span></div>
  <div class="nav-item" onclick="window.location.assign('/account.html')">👤<span>حسابي</span></div>
</div>

<script>
setTimeout(()=>{
  const intro=document.getElementById("introScreen");
  if(intro) intro.remove();
},3500);
</script>

<script>
/* سكربتك الأصلي بدون أي تغيير */
const BASE="https://aura-backend-mpvi.onrender.com";
const API=BASE+"/movies";

let allSeries=[],currentEpisodes=[];
let isSubscribed=false;

async function checkSubscription(){
  const token=localStorage.getItem("token");
  if(!token) return;
  try{
    const res=await fetch(BASE+"/check-subscription",{
      headers:{Authorization:"Bearer "+token}
    });
    const data=await res.json();
    if(data.active) isSubscribed=true;
  }catch(e){}
}

searchInput.addEventListener("input",()=>{
  const v=searchInput.value.toLowerCase();
  const f=allSeries.filter(s=>s.title.toLowerCase().includes(v));
  renderSeries(f);
});

async function loadSeries(){
  await checkSubscription();
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderSeries(data);
}

function renderSeries(data){
  seriesGrid.innerHTML="";
  data.forEach(item=>{
    seriesGrid.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-title">${item.title}</div>
      </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  homeContent.style.display="none";
  seriesPage.style.display="block";

  currentEpisodes=s.episodes||[];
  episodesList.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    const locked=ep.isLocked && !isSubscribed;

    let badge="";
    if(!isSubscribed){
      badge=ep.isLocked?
      `<div class="badge badge-locked">🔒 للمشتركين</div>`:
      `<div class="badge badge-free">مجانية</div>`;
    }

    episodesList.innerHTML+=`
      <div class="episode-card" onclick="${locked?'alert(\'هذه الحلقة للمشتركين فقط 🔒\')':'playEpisode('+i+')'}">
        <img src="${ep.image||s.image}">
        <div class="episode-overlay"></div>
        ${badge}
        <div class="play-circle">▶</div>
        <div class="episode-duration">${ep.duration||''}</div>
        <div class="episode-number">الحلقة ${i+1}</div>
      </div>`;
  });
}

function playEpisode(i){
  const ep=currentEpisodes[i];
  if(ep.isLocked && !isSubscribed){
    alert("هذه الحلقة متاحة للمشتركين فقط 🔒");
    return;
  }

  const url=ep.video;
  playerModal.style.display="flex";

  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

function goHome(){
  seriesPage.style.display="none";
  homeContent.style.display="block";
}

loadSeries();
</script>

</body>
</html>
