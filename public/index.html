<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== صفحة المسلسل ===== */
.series-page{display:none}
.series-hero{position:relative;height:75vh}
.series-hero img{width:100%;height:100%;object-fit:cover}

/* ===== الحلقات (تصميم فاخر) ===== */
.episodes-grid{
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:30px;
}

.episode-card{
  position:relative;
  border-radius:25px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
}

.episode-card:hover{
  transform:translateY(-8px) scale(1.02);
}

.episode-card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.episode-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9) 15%,rgba(0,0,0,.4) 60%,transparent);
}

/* زر التشغيل */
.episode-play{
  position:absolute;
  top:18px;
  left:18px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  border-radius:50%;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  transition:.3s;
}

.episode-card:hover .episode-play{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
}

/* صندوق المعلومات */
.episode-info-box{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,.06);
  border-top:1px solid rgba(255,255,255,.1);
}

/* رقم الحلقة */
.episode-number{
  display:inline-block;
  padding:8px 22px;
  border-radius:40px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  font-size:14px;
  font-weight:bold;
  box-shadow:0 0 15px rgba(0,210,165,.6);
  margin-bottom:8px;
}

/* مدة الحلقة */
.episode-duration{
  font-size:13px;
  opacity:.85;
  letter-spacing:1px;
}

/* ===== المشغل ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#auraVideo{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="series-page" id="seriesPage">
  <div class="series-hero">
    <img id="heroImage">
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <video id="auraVideo" controls></video>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("seriesPage").style.display="block";
  document.getElementById("heroImage").src=s.image;

  currentEpisodes=s.episodes?.length?s.episodes:[{video:s.video,image:s.image}];

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
    <div class="episode-card" onclick="playEpisode(${i})">
      <img src="${ep.image||s.image}">
      <div class="episode-overlay"></div>
      <div class="episode-play">▶</div>
      <div class="episode-info-box">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration" id="duration-${i}">--:--</div>
      </div>
    </div>`;
    
    if(ep.video && ep.video.endsWith(".mp4")){
      const video = document.createElement("video");
      video.src = ep.video;
      video.addEventListener("loadedmetadata", function(){
        const mins = Math.floor(video.duration / 60);
        const secs = Math.floor(video.duration % 60).toString().padStart(2,'0');
        document.getElementById("duration-"+i).innerText = mins+":"+secs;
      });
    }
  });
}

function playEpisode(i){
  const url=currentEpisodes[i].video;
  const v=document.getElementById("auraVideo");

  document.getElementById("playerModal").style.display="flex";
  v.src=url;
  v.play();
}

loadSeries();
</script>

</body>
</html>
