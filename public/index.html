<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:120px;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
.header{
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(0,191,255,0.8);
}

/* ===== SEARCH ===== */
.search-container{ padding:0 20px 20px; }

.search-container input{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  color:white;
  font-size:14px;
}

/* ===== HOME CARDS ===== */
.section{ padding:20px; }
.section-title{ font-size:18px; margin-bottom:15px; }

.row{
  display:flex;
  gap:20px;
  overflow-x:auto;
}
.row::-webkit-scrollbar{ display:none; }

.card{
  min-width:190px;
  max-width:190px;
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  background:#111;
  transition:.3s;
}
.card:hover{ transform:scale(1.05); }

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* ===== SERIES PAGE ===== */
.series-page{ display:none; }

.series-hero{
  position:relative;
  height:70vh;
  overflow:hidden;
}

.series-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

.hero-content{
  position:absolute;
  bottom:40px;
  right:30px;
  max-width:500px;
}

.hero-title{
  font-size:32px;
  margin-bottom:15px;
}

.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-size:16px;
  color:white;
  cursor:pointer;
  margin-bottom:15px;
}

/* ===== EPISODES GRID ===== */
.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}

.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.episode-card:hover{
  transform:scale(1.03);
}

.episode-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.episode-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:70%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

.episode-number{
  position:absolute;
  bottom:15px;
  right:15px;
  font-weight:bold;
  font-size:16px;
}

.episode-duration{
  position:absolute;
  bottom:15px;
  left:15px;
  font-size:14px;
  opacity:.9;
}

/* ===== VIDEO MODAL ===== */
#videoModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:9999;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#playerContainer{
  width:95%;
  max-width:1000px;
  height:550px;
}

#playerContainer iframe,
#playerContainer video{
  width:100%;
  height:100%;
  border:none;
  border-radius:20px;
  background:#000;
}

.close-btn{
  margin:20px;
  background:#00bfff;
  border:none;
  padding:10px 25px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== NAV ===== */
.bottom-nav{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  height:70px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  font-size:22px;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
  color:white;
}
.nav-item.active{
  background:#00bfff;
}
</style>
</head>

<body>

<div class="header">🌙 AURA</div>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="ابحث عن مسلسل..." oninput="searchSeries()">
</div>

<div id="homeContent">
  <div class="section">
    <div class="section-title">🔥 جديد الآن</div>
    <div class="row" id="seriesRow"></div>
  </div>
</div>

<div class="series-page" id="seriesPage">
  <button class="close-btn" onclick="goHome()">⬅ رجوع</button>

  <div class="series-hero">
    <img id="heroImage">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-title" id="seriesTitle"></div>
      <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
    </div>
  </div>

  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="videoModal">
  <button class="close-btn" onclick="closePlayer()">✖ إغلاق</button>
  <div id="playerContainer"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">🏠</div>
  <div class="nav-item" onclick="window.location.href='settings.html'">⚙️</div>
  <div class="nav-item" onclick="goProfile()">👤</div>
</div>

<script>
const API_BASE="https://aura-backend-mpvi.onrender.com";
const MOVIES_API=API_BASE+"/movies";

let allSeries=[];
let currentSeries=null;

async function loadSeries(){
  const res=await fetch(MOVIES_API);
  const data=await res.json();
  allSeries=data;
  renderSeries(data);
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
      </div>`;
  });
}

function searchSeries(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  const filtered=allSeries.filter(item=>
    item.title.toLowerCase().includes(value)
  );
  renderSeries(filtered);
}

function openSeries(id){
  const series=allSeries.find(s=>s._id===id);
  if(!series) return;

  currentSeries=series;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";

  document.getElementById("seriesTitle").innerText=series.title;
  document.getElementById("heroImage").src=series.image;

  let episodes=series.episodes;
  if((!episodes||episodes.length===0)&&series.video){
    episodes=[{_id:"ep1",name:"الحلقة 1",video:series.video,image:series.image}];
  }

  document.getElementById("mainPlayBtn").onclick=function(){
    playEpisode(episodes[0].video);
  }

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  episodes.forEach((ep,index)=>{
    list.innerHTML+=`
      <div class="episode-card"
      onclick="playEpisode('${ep.video}')">
        <img src="${ep.image||series.image}">
        <div class="episode-overlay"></div>
        <div class="episode-number">الحلقة ${index+1}</div>
        <div class="episode-duration">48:00</div>
      </div>`;
  });
}

function playEpisode(url){
  const container=document.getElementById("playerContainer");
  container.innerHTML="";

  if(url.includes("drive.google.com")){
    const match=url.match(/\/d\/(.*?)\//);
    if(match && match[1]){
      const preview="https://drive.google.com/file/d/"+match[1]+"/preview";
      container.innerHTML=`<iframe src="${preview}" allow="autoplay" allowfullscreen></iframe>`;
    }
  }else{
    container.innerHTML=`<video src="${url}" controls autoplay></video>`;
  }

  document.getElementById("videoModal").style.display="flex";
}

function closePlayer(){
  document.getElementById("playerContainer").innerHTML="";
  document.getElementById("videoModal").style.display="none";
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

function goProfile(){
  window.location.href="account.html";
}

loadSeries();
</script>

</body>
</html>
