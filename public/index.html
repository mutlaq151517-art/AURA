<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1f38;
  color:white;
}

/* ===== الصفحة الرئيسية ===== */

.hero{
  position:relative;
  height:85vh;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0b1f38 20%,transparent 60%);
}

.hero-content{
  position:absolute;
  bottom:80px;
  right:40px;
  max-width:500px;
}

.hero-title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
}

.hero-sub{
  opacity:.8;
  margin-bottom:20px;
}

.live-btn{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  padding:14px 40px;
  border-radius:30px;
  border:none;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.section{
  padding:30px;
}

.section h2{
  margin-bottom:20px;
}

.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.row img{
  width:160px;
  height:220px;
  border-radius:15px;
  object-fit:cover;
  cursor:pointer;
}

/* ===== صفحة المسلسل ===== */

#seriesPage{
  display:none;
}

.top-bar{
  display:flex;
  align-items:center;
  padding:20px;
  font-size:18px;
}

.back-btn{
  cursor:pointer;
  margin-left:15px;
}

.episodes{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.episode-card{
  background:#16293f;
  border-radius:18px;
  overflow:hidden;
}

.episode-image{
  position:relative;
}

.episode-image img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.duration{
  position:absolute;
  bottom:15px;
  left:15px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(0,0,0,.6);
  padding:6px 12px;
  border-radius:30px;
}

.play-circle{
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid #00d2a5;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.ep-number{
  position:absolute;
  bottom:15px;
  right:15px;
  font-size:20px;
  font-weight:bold;
}

.ep-content{
  padding:18px;
}

.ep-desc{
  opacity:.85;
  line-height:1.6;
  margin-bottom:15px;
}

.ep-actions{
  display:flex;
  justify-content:flex-end;
  gap:25px;
  opacity:.8;
}

.ep-actions span{
  cursor:pointer;
}

/* ===== المشغل ===== */

#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:9999;
  align-items:center;
  justify-content:center;
}

#player video{
  width:100%;
  height:100%;
}

</style>
</head>

<body>

<!-- ===== الصفحة الرئيسية ===== -->

<div id="homePage">

  <div class="hero">
    <img src="https://images.unsplash.com/photo-1564769625905-50e93615e769">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-title">القرآن الكريم</div>
      <div class="hero-sub">استمع للقرآن الكريم الآن</div>
      <button class="live-btn">البث المباشر ▶</button>
    </div>
  </div>

  <div class="section">
    <h2>متابعة المشاهدة</h2>
    <div class="row">
      <img src="https://images.unsplash.com/photo-1505685296765-3a2736de412f" onclick="openSeries()">
      <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4">
      <img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66">
    </div>
  </div>

</div>

<!-- ===== صفحة المسلسل ===== -->

<div id="seriesPage">

  <div class="top-bar">
    <div class="back-btn" onclick="goHome()">✖</div>
    الموسم 1
  </div>

  <div class="episodes">

    <div class="episode-card">
      <div class="episode-image">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
        <div class="duration">
          <div class="play-circle">▶</div>
          39:15
        </div>
        <div class="ep-number">الحلقة 1</div>
      </div>
      <div class="ep-content">
        <div class="ep-desc">
          يتحول يوم عادي إلى فوضى بينما يعمل توني...
        </div>
        <div class="ep-actions">
          <span>⬇ تنزيل</span>
          <span>↗ شارك</span>
        </div>
      </div>
    </div>

    <div class="episode-card">
      <div class="episode-image">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c">
        <div class="duration">
          <div class="play-circle">▶</div>
          39:56
        </div>
        <div class="ep-number">الحلقة 2</div>
      </div>
      <div class="ep-content">
        <div class="ep-desc">
          تتزايد الضغوط على توني وسط قرارات حاسمة...
        </div>
        <div class="ep-actions">
          <span>⬇ تنزيل</span>
          <span>↗ شارك</span>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- ===== المشغل ===== -->

<div id="player">
  <video controls></video>
</div>

<script>
function openSeries(){
  document.getElementById("homePage").style.display="none";
  document.getElementById("seriesPage").style.display="block";
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}
</script>

</body>
</html>
