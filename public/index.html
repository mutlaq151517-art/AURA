<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AURA</title>
<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}
header {
    background:#111;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:3px;
}
button {
    padding:8px 15px;
    background:#e50914;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
.container {
    padding:20px;
}
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}
.card {
    background:#1c1c1c;
    padding:10px;
    border-radius:8px;
}
.card img {
    width:100%;
    border-radius:8px;
}
.admin {
    margin-top:30px;
    padding:20px;
    background:#1a1a1a;
}
input {
    padding:8px;
    margin:5px 0;
    width:100%;
}
</style>
</head>
<body>

<header>AURA 🎬</header>

<div class="container">
    <h2>الأفلام والمسلسلات</h2>
    <div class="grid" id="movieList"></div>

    <div class="admin">
        <h2>لوحة التحكم</h2>
        <input type="text" id="title" placeholder="اسم الفيلم أو المسلسل">
        <input type="text" id="image" placeholder="رابط صورة الغلاف">
        <button onclick="addMovie()">إضافة</button>
    </div>
</div>

<script>
let movies = JSON.parse(localStorage.getItem("movies")) || [];

function render() {
    const list = document.getElementById("movieList");
    list.innerHTML = "";
    movies.forEach((movie,index) => {
        list.innerHTML += `
        <div class="card">
            <img src="${movie.image}">
            <h4>${movie.title}</h4>
            <button onclick="deleteMovie(${index})">حذف</button>
        </div>
        `;
    });
}

function addMovie(){
    const title = document.getElementById("title").value;
    const image = document.getElementById("image").value;
    if(title && image){
        movies.push({title,image});
        localStorage.setItem("movies", JSON.stringify(movies));
        render();
    }
}

function deleteMovie(index){
    movies.splice(index,1);
    localStorage.setItem("movies", JSON.stringify(movies));
    render();
}

render();
</script>

</body>
</html>
