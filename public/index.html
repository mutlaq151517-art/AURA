<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#061a2f;
  color:white;
  padding-bottom:120px;
}

/* ===== Header ثابت ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  background:rgba(10,25,45,.85);
  backdrop-filter:blur(15px);
  z-index:1000;
  box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.search-box{
  position:relative;
}

.search-box input{
  width:100%;
  padding:13px 45px 13px 15px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:14px;
  background:white;
  color:#000;
}

.search-box span{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#555;
}

/* ===== Grid ===== */
.content{
  padding:130px 25px 20px 25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}
.card-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  font-size:13px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

/* ===== صفحة المسلسل ===== */
.series-page{display:none;padding-top:120px}

.series-header{
  padding:20px;
}
.series-header h2{
  margin:0 0 10px 0;
}

.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:12px 30px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== الحلقات ===== */
.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
}

.episode-card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.episode-card:hover{
  transform:translateY(-6px);
}
.episode-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:15px;
  font-size:11px;
}
.badge-free{ background:#00d2a5; }
.badge-locked{ background:#ff3b3b; }

.episode-number{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#00d2a5;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* ===== Player (بدون لمس) ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== Bottom Nav ثابت ===== */
.bottom-nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:65px;
  background:rgba(15,35,60,.85);
  backdrop-filter:blur(15px);
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:18px;
  color:#00d2a5;
  cursor:pointer;
}

.nav-item span{
  font-size:11px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مسلسلك...">
    <span>🔎</span>
  </div>
</div>

<div id="homeContent" class="content">
  <div class="grid" id="seriesGrid"></div>
</div>

<div class="series-page" id="seriesPage">
  <div class="series-header">
    <button class="play-main" onclick="goHome()">⬅ رجوع</button>
    <h2 id="seriesTitle"></h2>
    <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <div id="playerHeader">
    <div>AURA PLAYER</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls style="display:none"></video>
  <iframe id="auraFrame" allowfullscreen style="display:none"></iframe>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏡<span>الرئيسية</span></div>
  <div class="nav-item" onclick="window.location.href='/settings.html'">⚙️<span>الإعدادات</span></div>
  <div class="nav-item" onclick="window.location.assign('/account.html')">🧑<span>حسابي</span></div>
</div>

<script>
const BASE="https://aura-backend-mpvi.onrender.com";
const API=BASE+"/movies";

let allSeries=[],currentEpisodes=[];
let isSubscribed=false;

async function checkSubscription(){
  const token=localStorage.getItem("token");
  if(!token) return;
  try{
    const res=await fetch(BASE+"/check-subscription",{
      headers:{Authorization:"Bearer "+token}
    });
    const data=await res.json();
    if(data.active) isSubscribed=true;
  }catch(e){}
}

searchInput.addEventListener("input",()=>{
  const v=searchInput.value.toLowerCase();
  const f=allSeries.filter(s=>s.title.toLowerCase().includes(v));
  renderSeries(f);
});

async function loadSeries(){
  await checkSubscription();
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderSeries(data);
}

function renderSeries(data){
  seriesGrid.innerHTML="";
  data.forEach(item=>{
    seriesGrid.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-title">${item.title}</div>
      </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  homeContent.style.display="none";
  seriesPage.style.display="block";
  seriesTitle.innerText=s.title;

  currentEpisodes=s.episodes||[];
  mainPlayBtn.onclick=()=>playEpisode(0);

  episodesList.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    const locked=ep.isLocked && !isSubscribed;

    let badge="";
    if(!isSubscribed){
      if(ep.isLocked){
        badge=`<div class="badge badge-locked">🔒 للمشتركين</div>`;
      }else{
        badge=`<div class="badge badge-free">مجانية</div>`;
      }
    }

    episodesList.innerHTML+=`
      <div class="episode-card" onclick="${locked?'alert(\'هذه الحلقة للمشتركين فقط 🔒\')':'playEpisode('+i+')'}">
        <img src="${ep.image||s.image}" style="${locked?'filter:blur(4px);opacity:.6;':''}">
        ${badge}
        <div class="episode-number">الحلقة ${i+1}</div>
      </div>`;
  });
}

function playEpisode(i){
  const ep=currentEpisodes[i];
  if(ep.isLocked && !isSubscribed){
    alert("هذه الحلقة متاحة للمشتركين فقط 🔒");
    return;
  }

  const url=ep.video;
  playerModal.style.display="flex";

  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

function goHome(){
  seriesPage.style.display="none";
  homeContent.style.display="block";
}

loadSeries();
</script>

</body>
</html>
