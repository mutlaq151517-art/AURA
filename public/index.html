<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURAVO</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AURAVO">
<meta name="theme-color" content="#061a2f">
<link rel="apple-touch-icon" href="logo.png">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#061a2f;
  color:white;
  padding-bottom:100px;
}

/* ===== Header ثابت ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  background:rgba(8,25,45,.95);
  backdrop-filter:blur(12px);
  z-index:2000;
  text-align:center;
}

.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:12px;
}

.search-box{
  position:relative;
}

.search-box input{
  width:100%;
  padding:13px 45px 13px 15px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:14px;
  background:white;
  color:#000;
}

.search-box span{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#666;
}

.content{
  padding:130px 20px 20px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:230px;object-fit:cover;}
.card-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  font-size:13px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.series-page{display:none;padding-top:130px}

.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
}

.episode-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.episode-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.play-circle{
  position:absolute;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #00d2a5;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.episode-duration{
  position:absolute;
  bottom:30px;
  left:95px;
  font-size:18px;
  font-weight:bold;
}

.episode-number{
  position:absolute;
  bottom:25px;
  right:25px;
  font-size:26px;
  font-weight:bold;
}

.badge{
  position:absolute;
  top:15px;
  left:15px;
  padding:6px 12px;
  border-radius:15px;
  font-size:12px;
}
.badge-locked{ background:#ff3b3b; }
.badge-free{ background:#00d2a5; }

#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:rgba(15,35,60,.95);
  backdrop-filter:blur(15px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:3000;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:18px;
  color:#00d2a5;
  cursor:pointer;
}
.nav-item span{
  font-size:11px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURAVO</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مسلسلك...">
    <span>🔎</span>
  </div>
</div>

<!-- باقي الملف بدون أي تغيير -->
