<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== ترحيب احترافي ===== */
#welcomeModal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#0b1f38,#06121f 70%);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
  backdrop-filter:blur(10px);
}
.welcome-box{
  text-align:center;
  animation:fadeIn .8s ease;
}
.welcome-box h1{
  font-size:36px;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.welcome-box button{
  margin-top:25px;
  padding:14px 40px;
  border:none;
  border-radius:40px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  color:white;
  cursor:pointer;
  font-size:15px;
}
@keyframes fadeIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:scale(1)}
}

/* ===== Hero تحسين ===== */
.home-content{
  position:absolute;
  bottom:80px;
  right:40px;
  max-width:55%;
}
.home-title{
  font-size:40px;
  font-weight:bold;
  margin-bottom:20px;
  text-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* ===== بطاقات الحلقات Glass ===== */
.episodes-grid{
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:30px;
}
.episode-card{
  position:relative;
  border-radius:25px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
}
.episode-card:hover{
  transform:translateY(-8px);
}
.episode-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}
.episode-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 20%,rgba(0,0,0,.3) 60%,transparent);
}
.episode-info-box{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,.05);
}
.episode-number{
  display:inline-block;
  padding:6px 18px;
  border-radius:30px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  font-size:13px;
  margin-bottom:8px;
}
.episode-duration{
  font-size:12px;
  opacity:.8;
}
.episode-play{
  position:absolute;
  top:15px;
  left:15px;
  background:rgba(0,0,0,.7);
  border-radius:50%;
  width:45px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* ===== باقي التنسيق بدون تخريب ===== */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-weight:bold;font-size:20px;letter-spacing:2px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.8;}

.home-hero{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:75vh;
}
.home-hero::-webkit-scrollbar{display:none}
.hero-slide{min-width:100%;position:relative;scroll-snap-align:start}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.home-overlay{
  position:absolute;bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

.series-page{display:none}
.series-hero{position:relative;height:75vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.hero-content{position:absolute;bottom:50px;right:30px}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:16px 40px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:75px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.08);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  color:#00d2a5;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>

<div id="welcomeModal">
  <div class="welcome-box">
    <h1>مرحباً بك في AURA ✨</h1>
    <div>استمتع بتجربة مشاهدة فاخرة</div>
    <button onclick="closeWelcome()">دخول</button>
  </div>
</div>

<!-- باقي الهيكل كما هو -->

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

if(localStorage.getItem("aura_welcome")){
  document.getElementById("welcomeModal").style.display="none";
}
function closeWelcome(){
  localStorage.setItem("aura_welcome","1");
  document.getElementById("welcomeModal").style.display="none";
}

function formatDuration(seconds){
  if(!seconds) return "--:--";
  const m=Math.floor(seconds/60);
  const s=Math.floor(seconds%60);
  return m+":"+(s<10?"0"+s:s);
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;
  document.getElementById("heroImage").src=s.image;

  currentEpisodes=s.episodes?.length?s.episodes:[{video:s.video,image:s.image}];
  document.getElementById("mainPlayBtn").onclick=()=>playEpisode(0);

  const list=document.getElementById("episodesList");
  list.innerHTML="";
  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
    <div class="episode-card" onclick="playEpisode(${i})">
      <img src="${ep.image||s.image}">
      <div class="episode-overlay"></div>
      <div class="episode-play">▶</div>
      <div class="episode-info-box">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration">${ep.duration||"--:--"}</div>
      </div>
    </div>`;
  });
}
</script>

</body>
</html>
