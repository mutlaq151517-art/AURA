<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];
let isSubscribed=false;

/* ================== حالة الاشتراك ================== */

async function checkSubscription(){
  const token=localStorage.getItem("token");
  if(!token) return;

  try{
    const res=await fetch("https://aura-backend-mpvi.onrender.com/me",{
      headers:{ Authorization:"Bearer "+token }
    });
    if(res.ok){
      const data=await res.json();
      if(data.subscriptionActive) isSubscribed=true;
    }
  }catch(e){}
}

/* ================== دخول ================== */

function enterSite(){
  localStorage.setItem("aura_welcome","1");
  document.getElementById("welcomeModal").style.display="none";
}
if(localStorage.getItem("aura_welcome")){
  document.getElementById("welcomeModal").style.display="none";
}

/* ================== تحميل ================== */

async function loadSeries(){
  await checkSubscription();
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHeroSlider(data);
  renderSeries(data);
}

/* ================== عرض الهيرو ================== */

function renderHeroSlider(data){
  const hero=document.getElementById("homeHero");
  if(!data.length)return;
  const item=data[0];
  hero.innerHTML=`
    <div class="hero-slide">
      <img src="${item.image}">
      <div class="home-overlay"></div>
      <div class="home-content">
        <div class="home-title">${item.title}</div>
        <button class="btn-primary" onclick="openSeries('${item._id}')">▶ شاهد الآن</button>
      </div>
    </div>`;
}

/* ================== عرض المسلسلات ================== */

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
    <div class="card" onclick="openSeries('${item._id}')">
      <img src="${item.image}">
    </div>`;
  });
}

/* ================== فتح مسلسل ================== */

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  homeContent.style.display="none";
  seriesPage.style.display="block";
  seriesTitle.innerText=s.title;
  heroImage.src=s.image;

  currentEpisodes=s.episodes?.length?s.episodes:[{video:s.video,image:s.image,isFree:true}];
  mainPlayBtn.onclick=()=>playEpisode(0);

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{

    const locked = !ep.isFree && !isSubscribed;

    let badge="";
    if(!isSubscribed){
      if(ep.isFree){
        badge=`<div style="position:absolute;top:10px;left:10px;background:#00d2a5;padding:4px 10px;border-radius:15px;font-size:11px;">مجانية</div>`;
      }else{
        badge=`<div style="position:absolute;top:10px;left:10px;background:#ff3b3b;padding:4px 10px;border-radius:15px;font-size:11px;">🔒 للمشتركين</div>`;
      }
    }

    list.innerHTML+=`
      <div class="episode-card" onclick="${locked?'alert(\'هذه الحلقة للمشتركين فقط 🔒\')':'playEpisode('+i+')'}">
        <img src="${ep.image||s.image}" style="${locked?'filter:blur(4px);opacity:.6;':''}">
        <div class="episode-overlay"></div>
        ${badge}
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-play">▶ تشغيل</div>
      </div>`;
  });
}

/* ================== تشغيل ================== */

function playEpisode(i){
  const ep=currentEpisodes[i];

  if(!ep.isFree && !isSubscribed){
    alert("هذه الحلقة متاحة للمشتركين فقط 🔒");
    return;
  }

  const url=ep.video;
  playerModal.style.display="flex";

  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

/* ================== اغلاق ================== */

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

function goHome(){
  seriesPage.style.display="none";
  homeContent.style.display="block";
}

loadSeries();
</script>
