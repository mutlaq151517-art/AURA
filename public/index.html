<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== الهيدر المطور ===== */
.header{
  padding:15px 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  backdrop-filter:blur(12px);
  background:rgba(8,25,45,.6);
  position:sticky;
  top:0;
  z-index:1000;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:bold;
  font-size:22px;
  letter-spacing:2px;
}

.search-box{
  width:100%;
  position:relative;
}

.search-box input{
  width:100%;
  padding:12px 45px 12px 15px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:14px;
  background:white;
  color:#000;
}

.search-box span{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  color:#666;
}

/* ===== Hero ===== */
.home-hero{
  position:relative;
  height:75vh;
  overflow:hidden;
}
.hero-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.home-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.home-content{
  position:absolute;
  bottom:60px;
  right:40px;
}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  font-size:15px;
}

/* ===== عرض المسلسلات بشكل عصري ===== */
.section{
  padding:30px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
}
.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}
.card-title{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  font-size:13px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

/* ===== صفحة المسلسل ===== */
.series-page{display:none}

.series-hero{
  position:relative;
  height:65vh;
}
.series-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#071a2f 60%,transparent);
}
.hero-content{
  position:absolute;
  bottom:40px;
  right:40px;
}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== الحلقات بشكل فخم ===== */
.episodes-grid{
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:25px;
}

.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.episode-card:hover{
  transform:scale(1.05);
}
.episode-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:4px 10px;
  border-radius:15px;
  font-size:11px;
}
.badge-free{ background:#00d2a5; }
.badge-locked{ background:#ff3b3b; }

.episode-number{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#00d2a5;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

.episode-duration{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.7);
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

/* ===== المشغل (لم يتم لمسه) ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== البار السفلي (لم يتم لمسه) ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:20px;
  color:#00d2a5;
  cursor:pointer;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="logo">AURA</div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مسلسلك المفضل...">
    <span>🔍</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="section">
    <div class="grid" id="seriesGrid"></div>
  </div>
</div>

<div class="series-page" id="seriesPage">
  <button class="btn-primary" onclick="goHome()">⬅ رجوع</button>
  <div class="series-hero">
    <img id="heroImage">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h2 id="seriesTitle"></h2>
      <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
    </div>
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<!-- المشغل نفسه -->
<div id="playerModal">
  <div id="playerHeader">
    <div>AURA PLAYER</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls style="display:none"></video>
  <iframe id="auraFrame" allowfullscreen style="display:none"></iframe>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item" onclick="window.location.href='/settings.html'">⚙️<span>الإعدادات</span></div>
  <div class="nav-item" onclick="window.location.assign('/account.html')">👤<span>الحساب</span></div>
</div>

<script>
const BASE="https://aura-backend-mpvi.onrender.com";
const API=BASE+"/movies";

let allSeries=[],currentEpisodes=[];
let isSubscribed=false;

/* البحث */
searchInput.addEventListener("input",()=>{
  const value=searchInput.value.toLowerCase();
  const filtered=allSeries.filter(s=>s.title.toLowerCase().includes(value));
  renderSeries(filtered);
});

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHeroSlider(data);
  renderSeries(data);
}

function renderHeroSlider(data){
  if(!data.length)return;
  const item=data[0];
  homeHero.innerHTML=`
    <div class="hero-slide">
      <img src="${item.image}">
      <div class="home-overlay"></div>
      <div class="home-content">
        <button class="btn-primary" onclick="openSeries('${item._id}')">▶ شاهد الآن</button>
      </div>
    </div>`;
}

function renderSeries(data){
  seriesGrid.innerHTML="";
  data.forEach(item=>{
    seriesGrid.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-title">${item.title}</div>
      </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  homeContent.style.display="none";
  seriesPage.style.display="block";
  seriesTitle.innerText=s.title;
  heroImage.src=s.image;

  currentEpisodes=s.episodes||[];
  mainPlayBtn.onclick=()=>playEpisode(0);

  episodesList.innerHTML="";
  currentEpisodes.forEach((ep,i)=>{
    episodesList.innerHTML+=`
      <div class="episode-card" onclick="playEpisode(${i})">
        <img src="${ep.image||s.image}">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration">${ep.duration||''}</div>
      </div>`;
  });
}

function playEpisode(i){
  const url=currentEpisodes[i].video;
  playerModal.style.display="flex";

  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

function goHome(){
  seriesPage.style.display="none";
  homeContent.style.display="block";
}

loadSeries();
</script>

</body>
</html>
