<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== شاشة الترحيب ===== */
#welcomeModal{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#06121f,#0b1f38);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
}
.welcome-box{text-align:center}
.welcome-box h1{
  font-size:30px;
  margin-bottom:15px;
}
.welcome-box button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  color:white;
  cursor:pointer;
}

/* ===== الهيدر ===== */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-weight:bold;font-size:20px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.8}

/* ===== Hero ===== */
.home-hero{position:relative;height:75vh;}
.hero-slide{position:relative;height:100%;}
.hero-slide img{width:100%;height:100%;object-fit:cover;}
.home-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.home-content{
  position:absolute;
  bottom:60px;
  right:30px;
}
.home-title{
  font-size:36px;
  margin-bottom:15px;
  font-weight:bold;
}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:12px 30px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== كروت ===== */
.section{padding:25px;}
.row{display:flex;gap:15px;overflow-x:auto;}
.row::-webkit-scrollbar{display:none}
.card{
  min-width:160px;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.card img{width:100%;height:220px;object-fit:cover;}

/* ===== صفحة المسلسل ===== */
.series-page{display:none}
.series-hero{position:relative;height:70vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#071a2f 50%,transparent);
}
.hero-content{position:absolute;bottom:50px;right:30px}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== الحلقات ===== */
.episodes-grid{
  padding:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.episode-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.episode-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}
.episode-number{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#00d2a5;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}
.episode-play{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.6);
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

/* ===== المشغل ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== البار السفلي ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:20px;
  color:#00d2a5;
  cursor:pointer;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>

<div id="welcomeModal">
  <div class="welcome-box">
    <h1>مرحباً بك في AURA</h1>
    <button onclick="enterSite()">دخول</button>
  </div>
</div>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="section">
    <div class="row" id="seriesRow"></div>
  </div>
</div>

<div class="series-page" id="seriesPage">
  <button class="btn-primary" onclick="goHome()">⬅ رجوع</button>
  <div class="series-hero">
    <img id="heroImage">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div id="seriesTitle"></div>
      <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
    </div>
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <div id="playerHeader">
    <div>AURA PLAYER</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls style="display:none"></video>
  <iframe id="auraFrame" allowfullscreen style="display:none"></iframe>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item" onclick="window.location.href='/settings.html'">⚙️<span>الإعدادات</span></div>
  <div class="nav-item" onclick="window.location.assign('/account.html')">👤<span>الحساب</span></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

function enterSite(){
  localStorage.setItem("aura_welcome","1");
  document.getElementById("welcomeModal").style.display="none";
}
if(localStorage.getItem("aura_welcome")){
  document.getElementById("welcomeModal").style.display="none";
}

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHeroSlider(data);
  renderSeries(data);
}

function renderHeroSlider(data){
  const hero=document.getElementById("homeHero");
  if(!data.length)return;
  const item=data[0];
  hero.innerHTML=`
    <div class="hero-slide">
      <img src="${item.image}">
      <div class="home-overlay"></div>
      <div class="home-content">
        <div class="home-title">${item.title}</div>
        <button class="btn-primary" onclick="openSeries('${item._id}')">▶ شاهد الآن</button>
      </div>
    </div>`;
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
    <div class="card" onclick="openSeries('${item._id}')">
      <img src="${item.image}">
    </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  homeContent.style.display="none";
  seriesPage.style.display="block";
  seriesTitle.innerText=s.title;
  heroImage.src=s.image;

  currentEpisodes=s.episodes?.length?s.episodes:[{video:s.video,image:s.image}];
  mainPlayBtn.onclick=()=>playEpisode(0);

  const list=document.getElementById("episodesList");
  list.innerHTML="";
  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
    <div class="episode-card" onclick="playEpisode(${i})">
      <img src="${ep.image||s.image}">
      <div class="episode-overlay"></div>
      <div class="episode-number">الحلقة ${i+1}</div>
      <div class="episode-play">▶ تشغيل</div>
    </div>`;
  });
}

function playEpisode(i){
  const url=currentEpisodes[i].video;
  playerModal.style.display="flex";
  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

function goHome(){
  seriesPage.style.display="none";
  homeContent.style.display="block";
}

loadSeries();
</script>

</body>
</html>
