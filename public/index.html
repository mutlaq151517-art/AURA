<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0d223d,#071a2f 60%);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(12px);
  background:rgba(7,26,47,.55);
  z-index:1000;
}
.logo{font-weight:bold;font-size:20px;letter-spacing:2px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.85;}

/* ===== Hero ===== */
.home-hero{
  margin-top:70px;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:85vh;
}
.home-hero::-webkit-scrollbar{display:none}
.hero-slide{min-width:100%;position:relative;scroll-snap-align:start}
.hero-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.85);}
.home-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.95) 20%,rgba(7,26,47,.3) 60%,transparent);
}
.home-content{
  position:absolute;
  bottom:80px;
  right:40px;
  max-width:60%;
}
.home-title{font-size:38px;margin-bottom:15px;font-weight:bold;}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:40px;
  color:white;
  cursor:pointer;
  font-size:16px;
  box-shadow:0 10px 30px rgba(0,210,165,.25);
}

/* ===== Section ===== */
.section-title{font-size:20px;margin:30px 25px 10px;font-weight:bold;opacity:.9;}
.section{padding:10px 20px 30px;}
.row{display:flex;gap:18px;overflow-x:auto;padding-bottom:10px;}
.row::-webkit-scrollbar{display:none}

.card{
  min-width:190px;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:.35s;
}
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:.35s;
}
.card:hover img{transform:scale(1.08);}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.7),transparent);
}

/* ===== صفحة المسلسل ===== */
.series-page{display:none;padding-top:90px;}
.series-hero{position:relative;height:60vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.series-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.9),transparent);
}
.series-content{
  position:absolute;
  bottom:40px;
  right:30px;
}
.back-btn{
  margin:20px;
  background:#00d2a5;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:75px;
  background:rgba(7,26,47,.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.08);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  color:#00d2a5;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="section-title">🔥 الأكثر مشاهدة</div>
  <div class="section">
    <div class="row" id="seriesRow"></div>
  </div>
</div>

<div class="series-page" id="seriesPage">
  <button class="back-btn" onclick="goHome()">⬅ رجوع</button>
  <div class="series-hero">
    <img id="seriesImage">
    <div class="series-overlay"></div>
    <div class="series-content">
      <h2 id="seriesTitle"></h2>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item">⚙️<span>الإعدادات</span></div>
  <div class="nav-item">👤<span>الحساب</span></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHeroSlider(data);
  renderSeries(data);
}

function renderHeroSlider(data){
  const hero=document.getElementById("homeHero");
  hero.innerHTML="";
  data.forEach(item=>{
    hero.innerHTML+=`
    <div class="hero-slide">
      <img src="${item.image}">
      <div class="home-overlay"></div>
      <div class="home-content">
        <div class="home-title">${item.title}</div>
        <button class="btn-primary" onclick="openSeries('${item._id}')">▶ شاهد الآن</button>
      </div>
    </div>`;
  });
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
    <div class="card" onclick="openSeries('${item._id}')">
      <img src="${item.image}">
    </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;
  document.getElementById("seriesImage").src=s.image;
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
