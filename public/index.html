<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== الحلقات - تصميم مثل MBC ===== */

.episodes-grid{
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.episode-card{
  background:#16293f;
  border-radius:18px;
  overflow:hidden;
}

.episode-image{
  position:relative;
}

.episode-image img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.episode-duration{
  position:absolute;
  bottom:15px;
  left:15px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(0,0,0,.6);
  padding:6px 12px;
  border-radius:30px;
  font-size:14px;
}

.play-circle{
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid #00d2a5;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.episode-number{
  position:absolute;
  bottom:15px;
  right:15px;
  font-size:20px;
  font-weight:bold;
}

.episode-content{
  padding:18px;
}

.episode-description{
  font-size:14px;
  opacity:.85;
  line-height:1.6;
  margin-bottom:15px;
}

.episode-actions{
  display:flex;
  justify-content:flex-end;
  gap:25px;
  font-size:14px;
  opacity:.8;
}

.action-btn{
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
}

/* ===== المشغل ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#auraVideo{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="episodes-grid" id="episodesList"></div>

<div id="playerModal">
  <video id="auraVideo" controls></video>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;

  if(data.length){
    openSeries(data[0]._id);
  }
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  currentEpisodes=s.episodes?.length?s.episodes:[{video:s.video,image:s.image,description:""}];

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
    <div class="episode-card">

      <div class="episode-image" onclick="playEpisode(${i})">
        <img src="${ep.image||s.image}">
        <div class="episode-duration">
          <div class="play-circle">▶</div>
          <span id="duration-${i}">--:--</span>
        </div>
        <div class="episode-number">الحلقة ${i+1}</div>
      </div>

      <div class="episode-content">
        <div class="episode-description">
          ${ep.description || "لا يوجد وصف للحلقة حالياً"}
        </div>

        <div class="episode-actions">
          <div class="action-btn">⬇ تنزيل</div>
          <div class="action-btn">↗ شارك</div>
        </div>
      </div>

    </div>
    `;

    if(ep.video && ep.video.endsWith(".mp4")){
      const video = document.createElement("video");
      video.src = ep.video;
      video.addEventListener("loadedmetadata", function(){
        const mins = Math.floor(video.duration / 60);
        const secs = Math.floor(video.duration % 60).toString().padStart(2,'0');
        document.getElementById("duration-"+i).innerText = mins+":"+secs;
      });
    }
  });
}

function playEpisode(i){
  const url=currentEpisodes[i].video;
  const v=document.getElementById("auraVideo");

  document.getElementById("playerModal").style.display="flex";
  v.src=url;
  v.play();
}

loadSeries();
</script>

</body>
</html>
