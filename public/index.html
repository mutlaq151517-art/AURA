<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#081b30,#071a2f 60%);
  color:white;
  overflow-x:hidden;
  padding-bottom:90px;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(7,26,47,.95);
  backdrop-filter:blur(12px);
  z-index:1000;
}
.logo{
  font-weight:bold;
  font-size:20px;
  letter-spacing:2px;
}

/* ===== Search Bar ===== */
.search-container{
  margin-top:75px;
  padding:0 20px;
}
.search-box{
  width:100%;
  background:white;
  border-radius:30px;
  padding:12px 18px;
  display:flex;
  align-items:center;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
}
.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:14px;
  background:transparent;
}
.search-box span{
  margin-left:10px;
  color:#555;
  font-size:18px;
}

/* ===== Featured Banner ===== */
.featured{
  margin:25px 20px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  height:220px;
}
.featured img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.8);
}
.featured-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}
.featured-content{
  position:absolute;
  bottom:20px;
  right:20px;
}
.featured-title{
  font-size:20px;
  margin-bottom:10px;
}
.btn{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  padding:8px 18px;
  border:none;
  border-radius:20px;
  color:white;
  font-size:13px;
  cursor:pointer;
}

/* ===== Grid ===== */
.section-title{
  padding:10px 20px;
  font-size:16px;
  font-weight:bold;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:0 20px;
}
.card{
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}
.card-title{
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:14px;
  font-weight:bold;
}

/* ===== Series Page ===== */
.series-page{
  display:none;
  padding-top:70px;
}
.back-btn{
  margin:15px;
  padding:6px 15px;
  border:none;
  border-radius:15px;
  background:#00d2a5;
  cursor:pointer;
}
.episodes-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}
.episode-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.episode-card::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
}
.episode-number{
  position:absolute;
  bottom:8px;
  right:8px;
  background:#00d2a5;
  padding:4px 10px;
  border-radius:15px;
  font-size:11px;
}
.episode-duration{
  position:absolute;
  bottom:8px;
  left:8px;
  background:rgba(0,0,0,.6);
  padding:4px 10px;
  border-radius:15px;
  font-size:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
</div>

<div id="homeContent">

  <!-- Search -->
  <div class="search-container">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن مسلسل..." oninput="filterSeries()">
    </div>
  </div>

  <!-- Featured -->
  <div class="featured" id="featured"></div>

  <div class="section-title">🔥 الأكثر مشاهدة</div>
  <div class="grid" id="seriesGrid"></div>

</div>

<!-- Series Page -->
<div class="series-page" id="seriesPage">
  <button class="back-btn" onclick="goHome()">⬅ رجوع</button>
  <h2 id="seriesTitle" style="padding:0 15px;"></h2>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<!-- ⚠️ بار الأقسام السفلي مثل ما هو عندك — لا تغيير -->
<div class="bottom-nav">
  <div class="nav-item">🏠<span>الرئيسية</span></div>
  <div class="nav-item">⚙️<span>الإعدادات</span></div>
  <div class="nav-item">👤<span>الحساب</span></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHome(data);
}

function renderHome(data){
  const featured=document.getElementById("featured");
  const grid=document.getElementById("seriesGrid");

  if(data.length){
    featured.innerHTML=`
      <img src="${data[0].image}">
      <div class="featured-overlay"></div>
      <div class="featured-content">
        <div class="featured-title">${data[0].title}</div>
        <button class="btn" onclick="openSeries('${data[0]._id}')">▶ شاهد الآن</button>
      </div>`;
  }

  grid.innerHTML="";
  data.forEach(item=>{
    grid.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-title">${item.title}</div>
      </div>`;
  });
}

function filterSeries(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  const filtered=allSeries.filter(s=>s.title.toLowerCase().includes(value));
  renderHome(filtered);
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;

  const list=document.getElementById("episodesList");
  list.innerHTML="";
  (s.episodes||[]).forEach((ep,i)=>{
    list.innerHTML+=`
      <div class="episode-card">
        <img src="${ep.image || s.image}">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration">${ep.duration || "--:--"}</div>
      </div>`;
  });
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
