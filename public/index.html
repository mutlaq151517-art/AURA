<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== الهيدر ===== */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-weight:bold;font-size:20px;letter-spacing:2px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.8}

/* ===== HERO نتفلكس ===== */
.home-hero{
  position:relative;
  height:85vh;
}
.hero-slide{
  position:relative;
  height:100%;
}
.hero-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.home-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#071a2f 20%,rgba(7,26,47,.5) 60%,transparent);
}
.home-content{
  position:absolute;
  bottom:90px;
  right:50px;
  max-width:60%;
}
.home-title{
  font-size:44px;
  font-weight:bold;
  margin-bottom:20px;
}
.btn-primary{
  background:white;
  color:black;
  border:none;
  padding:12px 30px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== قسم ===== */
.section-title{
  font-size:20px;
  font-weight:bold;
  margin:30px 25px 10px;
}

/* ===== صف المسلسلات ===== */
.section{padding:0 20px 20px}
.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
}
.row::-webkit-scrollbar{display:none}

/* ===== كروت نتفلكس ===== */
.card{
  min-width:160px;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card img{
  width:100%;
  height:240px;
  object-fit:cover;
  transition:.3s;
}
.card:hover img{
  transform:scale(1.08);
}

/* ===== صفحة المسلسل (بدون لمس المنطق) ===== */
.series-page{display:none}
.series-hero{position:relative;height:75vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.hero-content{position:absolute;bottom:50px;right:30px}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:16px 40px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* ===== الحلقات كما هي ===== */
.episodes-grid{
  padding:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:25px;
}
.episode-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:210px;
  object-fit:cover;
}
.episode-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:80%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.episode-number{
  position:absolute;
  top:12px;
  right:12px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
}
.episode-play{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,.7);
  padding:8px 15px;
  border-radius:20px;
  font-size:13px;
}

/* ===== المشغل (لم يتم لمسه) ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== البار السفلي ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:75px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.08);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  color:#00d2a5;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>

  <div class="section-title">🔥 الأكثر مشاهدة</div>
  <div class="section">
    <div class="row" id="seriesRow"></div>
  </div>
</div>

<!-- صفحة المسلسل والمشغل كما هم -->
