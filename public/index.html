<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:120px;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
}

.logo{
  font-weight:bold;
  font-size:20px;
  letter-spacing:2px;
}

.top-menu{
  display:flex;
  gap:20px;
  font-size:14px;
  opacity:.8;
}

/* ===== HOME HERO ===== */
.home-hero{
  position:relative;
  height:70vh;
  overflow:hidden;
}

.home-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.home-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

.home-content{
  position:absolute;
  bottom:40px;
  right:25px;
  max-width:500px;
}

.home-title{
  font-size:28px;
  margin-bottom:15px;
}

.hero-buttons{
  display:flex;
  gap:15px;
  margin-bottom:15px;
}

.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:12px 25px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

.btn-outline{
  background:transparent;
  border:2px solid #00d2a5;
  padding:10px 22px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

.dots{
  display:flex;
  gap:6px;
}

.dot{
  width:6px;
  height:6px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
}

.dot.active{
  width:18px;
  border-radius:10px;
  background:#00d2a5;
}

/* ===== CONTINUE ROW ===== */
.section{
  padding:20px;
}

.section-title{
  font-size:16px;
  margin-bottom:15px;
}

.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
}
.row::-webkit-scrollbar{ display:none; }

.card{
  min-width:170px;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.card-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

/* ===== SERIES PAGE (UNCHANGED) ===== */
.series-page{ display:none; }

.series-hero{
  position:relative;
  height:70vh;
  overflow:hidden;
}

.series-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

.hero-content{
  position:absolute;
  bottom:40px;
  right:30px;
  max-width:500px;
}

.hero-title{
  font-size:32px;
  margin-bottom:15px;
}

.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-size:16px;
  color:white;
  cursor:pointer;
  margin-bottom:15px;
}

/* ===== EPISODES GRID ===== */
.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}

.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.episode-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.episode-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:70%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

.episode-number{
  position:absolute;
  bottom:15px;
  right:15px;
  font-weight:bold;
}

.episode-duration{
  position:absolute;
  bottom:15px;
  left:15px;
  opacity:.9;
}

/* ===== NAV ===== */
.bottom-nav{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  height:70px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  font-size:22px;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
  color:white;
}
.nav-item.active{
  background:#00bfff;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">

  <div class="home-hero" id="homeHero">
    <img id="homeHeroImage">
    <div class="home-overlay"></div>

    <div class="home-content">
      <div class="home-title" id="homeHeroTitle"></div>

      <div class="hero-buttons">
        <button class="btn-primary" id="watchNowBtn">▶ شاهد الآن</button>
        <button class="btn-outline">+ أضف لقائمتي</button>
      </div>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">متابعة المشاهدة</div>
    <div class="row" id="seriesRow"></div>
  </div>

</div>

<!-- ===== SERIES PAGE (UNCHANGED) ===== -->
<div class="series-page" id="seriesPage">
  <button class="btn-primary" onclick="goHome()">⬅ رجوع</button>

  <div class="series-hero">
    <img id="heroImage">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-title" id="seriesTitle"></div>
      <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
    </div>
  </div>

  <div class="episodes-grid" id="episodesList"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">🏠</div>
  <div class="nav-item">⚙️</div>
  <div class="nav-item">👤</div>
</div>

<script>
const API_BASE="https://aura-backend-mpvi.onrender.com";
const MOVIES_API=API_BASE+"/movies";

let allSeries=[];

async function loadSeries(){
  const res=await fetch(MOVIES_API);
  const data=await res.json();
  allSeries=data;

  renderSeries(data);

  if(data.length>0){
    document.getElementById("homeHeroImage").src=data[0].image;
    document.getElementById("homeHeroTitle").innerText=data[0].title;
    document.getElementById("watchNowBtn").onclick=()=>{
      openSeries(data[0]._id);
    }
  }
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-overlay"></div>
      </div>`;
  });
}

function openSeries(id){
  const series=allSeries.find(s=>s._id===id);
  if(!series) return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";

  document.getElementById("seriesTitle").innerText=series.title;
  document.getElementById("heroImage").src=series.image;

  let episodes=series.episodes;
  if((!episodes||episodes.length===0)&&series.video){
    episodes=[{video:series.video,image:series.image}];
  }

  document.getElementById("mainPlayBtn").onclick=function(){
    playEpisode(episodes[0].video);
  }

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  episodes.forEach((ep,index)=>{
    list.innerHTML+=`
      <div class="episode-card"
      onclick="playEpisode('${ep.video}')">
        <img src="${ep.image||series.image}">
        <div class="episode-overlay"></div>
        <div class="episode-number">الحلقة ${index+1}</div>
        <div class="episode-duration">48:00</div>
      </div>`;
  });
}

function playEpisode(url){
  window.open(url,'_blank');
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
