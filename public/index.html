<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0d223d,#071a2f 60%);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(12px);
  background:rgba(7,26,47,.55);
  z-index:1000;
}
.logo{font-weight:bold;font-size:18px;letter-spacing:2px;}
.top-menu{display:flex;gap:15px;font-size:13px;opacity:.85;}

/* ===== Hero (مصغر) ===== */
.home-hero{
  margin-top:65px;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:60vh;
}
.home-hero::-webkit-scrollbar{display:none}
.hero-slide{min-width:100%;position:relative;scroll-snap-align:start}
.hero-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.85);
}
.home-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.95) 20%,rgba(7,26,47,.3) 60%,transparent);
}
.home-content{
  position:absolute;
  bottom:50px;
  right:25px;
  max-width:70%;
}
.home-title{
  font-size:26px;
  margin-bottom:10px;
  font-weight:bold;
}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:10px 22px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* ===== Section ===== */
.section-title{font-size:17px;margin:25px 20px 10px;font-weight:bold;}
.section{padding:10px 20px 30px;}
.row{display:flex;gap:15px;overflow-x:auto;}
.row::-webkit-scrollbar{display:none}

.card{
  min-width:150px;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}
.card img{
  width:100%;
  height:210px;
  object-fit:cover;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.7),transparent);
}

/* ===== صفحة المسلسل ===== */
.series-page{
  display:none;
  padding-top:70px;
}
.series-hero{
  position:relative;
  height:45vh;
}
.series-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.series-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.9),transparent);
}
.series-content{
  position:absolute;
  bottom:30px;
  right:20px;
}
.back-btn{
  margin:15px;
  background:#00d2a5;
  border:none;
  padding:8px 18px;
  border-radius:20px;
  cursor:pointer;
}

/* ===== الحلقات ===== */
.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}
.episode-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.episode-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.85),transparent);
}
.episode-number{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#00d2a5;
  padding:4px 10px;
  border-radius:15px;
  font-size:12px;
}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:65px;
  background:rgba(7,26,47,.9);
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:20px;
  cursor:pointer;
  color:#00d2a5;
}
.nav-item span{font-size:11px;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="section-title">🔥 الأكثر مشاهدة</div>
  <div class="section">
    <div class="row" id="seriesRow"></div>
  </div>
</div>

<div class="series-page" id="seriesPage">
  <button class="back-btn" onclick="goHome()">⬅ رجوع</button>
  <div class="series-hero">
    <img id="seriesImage">
    <div class="series-overlay"></div>
    <div class="series-content">
      <h2 id="seriesTitle"></h2>
    </div>
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item">⚙️<span>الإعدادات</span></div>
  <div class="nav-item">👤<span>الحساب</span></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHeroSlider(data);
  renderSeries(data);
}

function renderHeroSlider(data){
  const hero=document.getElementById("homeHero");
  hero.innerHTML="";
  data.forEach(item=>{
    hero.innerHTML+=`
    <div class="hero-slide">
      <img src="${item.image}">
      <div class="home-overlay"></div>
      <div class="home-content">
        <div class="home-title">${item.title}</div>
        <button class="btn-primary" onclick="openSeries('${item._id}')">▶ شاهد الآن</button>
      </div>
    </div>`;
  });
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
    <div class="card" onclick="openSeries('${item._id}')">
      <img src="${item.image}">
    </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;
  document.getElementById("seriesImage").src=s.image;

  currentEpisodes=s.episodes || [];
  const list=document.getElementById("episodesList");
  list.innerHTML="";
  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
    <div class="episode-card">
      <img src="${ep.image || s.image}">
      <div class="episode-number">الحلقة ${i+1}</div>
    </div>`;
  });
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
