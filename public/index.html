<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#081b30,#071a2f);
  color:white;
  padding-bottom:90px;
  overflow-x:hidden;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(7,26,47,.95);
  backdrop-filter:blur(12px);
  z-index:1000;
}
.logo{font-size:20px;font-weight:bold}

/* ===== Search ===== */
.search-wrap{
  margin-top:70px;
  padding:15px 20px;
}
.search-box{
  background:#fff;
  border-radius:30px;
  padding:12px 18px;
  display:flex;
  align-items:center;
  box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:14px;
}

/* ===== Grid ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:0 20px 20px;
}
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}
.card-title{
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:14px;
  font-weight:bold;
}

/* ===== Series Page ===== */
.series-page{display:none;padding-top:70px}
.back-btn{
  margin:15px;
  padding:6px 15px;
  border:none;
  border-radius:15px;
  background:#00d2a5;
  cursor:pointer;
}

.episodes-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}
.episode-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.episode-card::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
}
.episode-number{
  position:absolute;
  bottom:8px;
  right:8px;
  background:#00d2a5;
  padding:4px 10px;
  border-radius:15px;
  font-size:11px;
}
.episode-duration{
  position:absolute;
  bottom:8px;
  left:8px;
  background:rgba(0,0,0,.6);
  padding:4px 10px;
  border-radius:15px;
  font-size:10px;
}

/* ===== Player ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:9999;
}
#playerHeader{
  padding:10px;
  background:#081b30;
  display:flex;
  justify-content:space-between;
}
#closePlayer{
  background:red;
  border:none;
  color:white;
  padding:5px 12px;
  border-radius:8px;
  cursor:pointer;
}
#auraVideo{width:100%;height:90%}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,.1);
}
.nav-item{
  text-align:center;
  font-size:20px;
  color:#00d2a5;
  cursor:pointer;
}
.nav-item span{
  display:block;
  font-size:11px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
</div>

<div id="homeContent">

  <div class="search-wrap">
    <div class="search-box">
      🔍
      <input type="text" id="searchInput" placeholder="ابحث عن مسلسل..." oninput="filterSeries()">
    </div>
  </div>

  <div class="grid" id="seriesGrid"></div>
</div>

<div class="series-page" id="seriesPage">
  <button class="back-btn" onclick="goHome()">⬅ رجوع</button>
  <h2 id="seriesTitle" style="padding:0 15px;"></h2>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <div id="playerHeader">
    <div>🎬 AURA Player</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls></video>
</div>

<!-- بار الأقسام موجود -->
<div class="bottom-nav">
  <div class="nav-item" onclick="goHome()">🏠<span>الرئيسية</span></div>
  <div class="nav-item">⚙️<span>الإعدادات</span></div>
  <div class="nav-item">👤<span>الحساب</span></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHome(data);
}

function renderHome(data){
  const grid=document.getElementById("seriesGrid");
  grid.innerHTML="";
  data.forEach(item=>{
    grid.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
        <div class="card-title">${item.title}</div>
      </div>`;
  });
}

function filterSeries(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  const filtered=allSeries.filter(s=>s.title.toLowerCase().includes(value));
  renderHome(filtered);
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;

  currentEpisodes=s.episodes||[];
  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
      <div class="episode-card" onclick="playEpisode(${i})">
        <img src="${ep.image || s.image}">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration">${ep.duration || "--:--"}</div>
      </div>`;
  });
}

function playEpisode(i){
  const video=document.getElementById("auraVideo");
  video.src=currentEpisodes[i].video;
  document.getElementById("playerModal").style.display="block";
}

document.getElementById("closePlayer").onclick=function(){
  const video=document.getElementById("auraVideo");
  video.pause();
  video.src="";
  document.getElementById("playerModal").style.display="none";
};

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
