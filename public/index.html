<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0d223d,#071a2f);
  color:white;
  overflow-x:hidden;
  padding-bottom:80px;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(7,26,47,.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}
.logo{font-weight:bold;font-size:18px}
.top-menu span{margin-left:15px;font-size:13px}

/* ===== Hero ===== */
.home-hero{
  margin-top:60px;
  height:55vh;
  position:relative;
}
.home-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(7,26,47,.9),transparent);
}
.hero-content{
  position:absolute;
  bottom:30px;
  right:20px;
}
.hero-title{
  font-size:24px;
  margin-bottom:10px;
}
.btn{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  padding:8px 20px;
  border:none;
  border-radius:20px;
  color:white;
  font-size:13px;
  cursor:pointer;
}

/* ===== Series Cards ===== */
.section-title{
  padding:15px 20px 5px;
  font-size:16px;
  font-weight:bold;
}
.row{
  display:flex;
  gap:15px;
  padding:10px 20px;
  overflow-x:auto;
}
.row::-webkit-scrollbar{display:none}
.card{
  min-width:140px;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;
  height:190px;
  object-fit:cover;
}

/* ===== Series Page ===== */
.series-page{
  display:none;
  padding-top:60px;
}
.back-btn{
  margin:15px;
  padding:6px 15px;
  border:none;
  border-radius:15px;
  background:#00d2a5;
  cursor:pointer;
}

.episodes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.episode-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
}
.episode-card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.episode-card::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}
.episode-number{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#00d2a5;
  padding:4px 10px;
  border-radius:15px;
  font-size:12px;
}
.episode-duration{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.6);
  padding:4px 10px;
  border-radius:15px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<!-- Home -->
<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="section-title">🔥 الأكثر مشاهدة</div>
  <div class="row" id="seriesRow"></div>
</div>

<!-- Series Page -->
<div class="series-page" id="seriesPage">
  <button class="back-btn" onclick="goHome()">⬅ رجوع</button>
  <h2 id="seriesTitle" style="padding:0 15px;"></h2>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<script>
const API="https://aura-backend-mpvi.onrender.com/movies";
let allSeries=[],currentEpisodes=[];

async function loadSeries(){
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHome(data);
}

function renderHome(data){
  const hero=document.getElementById("homeHero");
  const row=document.getElementById("seriesRow");

  if(data.length){
    hero.innerHTML=`
      <img src="${data[0].image}">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-title">${data[0].title}</div>
        <button class="btn" onclick="openSeries('${data[0]._id}')">▶ شاهد الآن</button>
      </div>`;
  }

  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
      <div class="card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
      </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=s.title;

  currentEpisodes=s.episodes||[];
  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,i)=>{
    list.innerHTML+=`
      <div class="episode-card">
        <img src="${ep.image || s.image}">
        <div class="episode-number">الحلقة ${i+1}</div>
        <div class="episode-duration">${ep.duration || "--:--"}</div>
      </div>`;
  });
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
