<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:120px;
  overflow-x:hidden;
}

/* HEADER */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-weight:bold;font-size:20px;letter-spacing:2px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.8;}

/* HERO */
.home-hero{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:70vh;
}
.home-hero::-webkit-scrollbar{display:none}
.hero-slide{min-width:100%;position:relative}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.home-overlay{
  position:absolute;bottom:0;width:100%;height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}
.home-content{position:absolute;bottom:40px;right:25px}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;padding:12px 25px;border-radius:30px;color:white;cursor:pointer;
}

/* SERIES */
.series-page{display:none}
.series-hero{position:relative;height:70vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;bottom:0;width:100%;height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}
.hero-content{position:absolute;bottom:40px;right:30px}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;padding:14px 30px;border-radius:30px;
  color:white;cursor:pointer;
}

/* EPISODES */
.episodes-grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}
.episode-card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
}
.episode-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.episode-overlay{
  position:absolute;
  bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}
.episode-number{
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(0,0,0,.7);
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}
.episode-duration{
  position:absolute;
  bottom:15px;
  left:15px;
  background:rgba(0,0,0,.7);
  padding:5px 10px;
  border-radius:15px;
  font-size:12px;
}

/* PLAYER */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}

#playerHeader{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#000;
}

#closePlayer{
  background:red;
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  color:white;
  font-size:18px;
  cursor:pointer;
}

#auraFrame{
  flex:1;
  width:100%;
  border:none;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  height:70px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.nav-item{
  font-size:22px;
  width:50px;height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
}
.nav-item.active{background:#00bfff;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURA</div>
  <div class="top-menu">
    <span>مسلسلات</span>
    <span>أفلام</span>
    <span>رياضة</span>
  </div>
</div>

<div id="homeContent">
  <div class="home-hero" id="homeHero"></div>
  <div class="episodes-grid" id="seriesRow"></div>
</div>

<div class="series-page" id="seriesPage">
  <button class="btn-primary" onclick="goHome()">⬅ رجوع</button>
  <div class="series-hero">
    <img id="heroImage">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div id="seriesTitle"></div>
      <button class="play-main" id="mainPlayBtn">▶ تشغيل الحلقة 1</button>
    </div>
  </div>
  <div class="episodes-grid" id="episodesList"></div>
</div>

<div id="playerModal">
  <div id="playerHeader">
    <div>🎬 AURA PLAYER</div>
    <button id="closePlayer">✖</button>
  </div>
  <iframe id="auraFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">🏠</div>
</div>

<script>
const API_BASE="https://aura-backend-mpvi.onrender.com/movies";

let allSeries=[];
let currentEpisodes=[];
const frame=document.getElementById("auraFrame");

async function loadSeries(){
  const res=await fetch(API_BASE);
  const data=await res.json();
  allSeries=data;
  renderSeries(data);
}

function renderSeries(data){
  const row=document.getElementById("seriesRow");
  row.innerHTML="";
  data.forEach(item=>{
    row.innerHTML+=`
      <div class="episode-card" onclick="openSeries('${item._id}')">
        <img src="${item.image}">
      </div>`;
  });
}

function openSeries(id){
  const series=allSeries.find(s=>s._id===id);
  if(!series)return;

  document.getElementById("homeContent").style.display="none";
  document.getElementById("seriesPage").style.display="block";
  document.getElementById("seriesTitle").innerText=series.title;
  document.getElementById("heroImage").src=series.image;

  currentEpisodes=series.episodes?.length?series.episodes:[{video:series.video,image:series.image}];

  document.getElementById("mainPlayBtn").onclick=()=>playEpisode(0);

  const list=document.getElementById("episodesList");
  list.innerHTML="";

  currentEpisodes.forEach((ep,index)=>{
    list.innerHTML+=`
      <div class="episode-card" onclick="playEpisode(${index})">
        <img src="${ep.image||series.image}">
        <div class="episode-overlay"></div>
        <div class="episode-number">الحلقة ${index+1}</div>
      </div>`;
  });
}

function playEpisode(index){
  frame.src=currentEpisodes[index].video;
  document.getElementById("playerModal").style.display="flex";
}

document.getElementById("closePlayer").onclick=function(){
  frame.src="";
  document.getElementById("playerModal").style.display="none";
}

function goHome(){
  document.getElementById("seriesPage").style.display="none";
  document.getElementById("homeContent").style.display="block";
}

loadSeries();
</script>

</body>
</html>
