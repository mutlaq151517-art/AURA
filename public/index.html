<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* ===== ترحيب ===== */
#welcomeModal{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#06121f,#0b1f38);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
}
.welcome-box{
  text-align:center;
  animation:fadeIn .8s ease;
}
.welcome-box h1{
  font-size:32px;
  margin-bottom:15px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.welcome-box button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  color:white;
  cursor:pointer;
}
@keyframes fadeIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:scale(1)}
}

/* ===== الهيدر ===== */
.header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-weight:bold;font-size:20px;letter-spacing:2px;}
.top-menu{display:flex;gap:20px;font-size:14px;opacity:.8;}

/* ===== Hero ===== */
.home-hero{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:75vh;
}
.home-hero::-webkit-scrollbar{display:none}
.hero-slide{min-width:100%;position:relative;scroll-snap-align:start}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.home-overlay{
  position:absolute;bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.home-content{
  position:absolute;
  bottom:60px;
  right:30px;
  max-width:60%;
}
.home-title{
  font-size:34px;
  margin-bottom:15px;
  font-weight:bold;
}
.btn-primary{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:14px 35px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  font-size:16px;
}

/* ===== بطاقات ===== */
.section{padding:25px;}
.row{display:flex;gap:15px;overflow-x:auto;}
.row::-webkit-scrollbar{display:none}
.card{
  min-width:170px;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:.3s;
}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:230px;object-fit:cover;}
.card-overlay{
  position:absolute;bottom:0;width:100%;height:60%;
  background:linear-gradient(to top,#071a2f 30%,transparent);
}

/* ===== صفحة المسلسل ===== */
.series-page{display:none}
.series-hero{position:relative;height:75vh}
.series-hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;bottom:0;width:100%;height:70%;
  background:linear-gradient(to top,#071a2f 40%,transparent);
}
.hero-content{position:absolute;bottom:50px;right:30px}
.play-main{
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  border:none;
  padding:16px 40px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  font-size:16px;
}

/* ===== الحلقات ===== */
.episodes-grid{
  padding:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:25px;
}
.episode-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.episode-card:hover{transform:translateY(-5px)}
.episode-card img{
  width:100%;
  height:210px;
  object-fit:cover;
}

/* ✅ تم تقليل شفافية التعتيم هنا فقط */
.episode-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:80%;
  background:linear-gradient(
    to top,
    rgba(7,26,47,0.35) 25%,
    rgba(7,26,47,0.15) 55%,
    transparent
  );
}

.episode-number{
  position:absolute;
  top:12px;
  right:12px;
  background:linear-gradient(90deg,#00d2a5,#1e90ff);
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
}
.episode-play{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,.7);
  padding:8px 15px;
  border-radius:20px;
  font-size:13px;
}

/* ===== مشغل ===== */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== التنقل السفلي ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:75px;
  background:#081b30;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.08);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  color:#00d2a5;
}
.nav-item span{font-size:12px;margin-top:4px;}
</style>
</head>

<body>
<!-- باقي الملف مثل ما هو بدون أي تعديل -->
</body>
</html>
