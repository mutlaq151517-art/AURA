<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURAVO</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AURAVO">
<meta name="theme-color" content="#061a2f">
<link rel="apple-touch-icon" href="logo.png">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#061a2f;
  color:white;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  background:rgba(8,25,45,.95);
  backdrop-filter:blur(12px);
  z-index:2000;
}
.logo{
  text-align:center;
  font-weight:bold;
  font-size:22px;
  margin-bottom:10px;
}
.search-box{position:relative;}
.search-box input{
  width:100%;
  padding:12px 45px 12px 15px;
  border-radius:30px;
  border:none;
  outline:none;
}
.search-box span{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
}

/* HERO */
.hero{
  position:relative;
  height:70vh;
  overflow:hidden;
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#061a2f 20%,transparent 70%);
}
.hero-content{
  position:absolute;
  bottom:40px;
  right:20px;
  left:20px;
}
.hero-title{
  font-size:36px;
  font-weight:bold;
  margin-bottom:10px;
}
.hero-buttons{
  display:flex;
  gap:10px;
}
.btn{
  padding:12px 18px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.btn-play{
  background:#00d2a5;
  color:white;
}
.btn-add{
  background:transparent;
  border:2px solid #00d2a5;
  color:white;
}

/* SECTION */
.section{
  padding:20px;
}
.section h3{
  margin-bottom:15px;
}
.horizontal{
  display:flex;
  gap:15px;
  overflow-x:auto;
}
.horizontal::-webkit-scrollbar{height:6px;}
.horizontal::-webkit-scrollbar-thumb{
  background:#00d2a5;
  border-radius:10px;
}
.card{
  min-width:160px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

/* SERIES PAGE */
.series-page{display:none;padding-top:120px;}
.episode-box{
  margin:20px;
  background:#0f2c50;
  border-radius:15px;
  overflow:hidden;
}
.episode-image{
  position:relative;
}
.episode-image img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.play-btn{
  position:absolute;
  bottom:15px;
  left:15px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:3px solid #00d2a5;
  display:flex;
  align-items:center;
  justify-content:center;
}
.episode-info{
  padding:15px;
}
.episode-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:8px;
}
.episode-desc{
  font-size:14px;
  color:#ccc;
}

/* PLAYER */
#playerModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  flex-direction:column;
}
#playerHeader{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1f38;
}
#closePlayer{
  background:#ff3b3b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
}
#auraVideo,#auraFrame{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">AURAVO</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن مسلسلك...">
    <span>🔎</span>
  </div>
</div>

<div id="homeContent" style="padding-top:100px;"></div>

<div class="series-page" id="seriesPage"></div>

<div id="playerModal">
  <div id="playerHeader">
    <div>AURAVO PLAYER</div>
    <button id="closePlayer">إغلاق</button>
  </div>
  <video id="auraVideo" controls style="display:none"></video>
  <iframe id="auraFrame" allowfullscreen style="display:none"></iframe>
</div>

<script>
const BASE="https://aura-backend-mpvi.onrender.com";
const API=BASE+"/movies";

let allSeries=[],currentEpisodes=[];
let isSubscribed=false;

async function checkSubscription(){
  const token=localStorage.getItem("token");
  if(!token) return;
  try{
    const res=await fetch(BASE+"/check-subscription",{
      headers:{Authorization:"Bearer "+token}
    });
    const data=await res.json();
    if(data.active) isSubscribed=true;
  }catch(e){}
}

async function loadSeries(){
  await checkSubscription();
  const res=await fetch(API);
  const data=await res.json();
  allSeries=data;
  renderHome();
}

function renderHome(){
  const container=document.getElementById("homeContent");
  container.innerHTML="";
  if(allSeries.length===0) return;

  const featured=allSeries[0];

  container.innerHTML+=`
  <div class="hero">
    <img src="${featured.image}">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-title">${featured.title}</div>
      <div class="hero-buttons">
        <button class="btn btn-play" onclick="openSeries('${featured._id}')">▶ شاهد الآن</button>
        <button class="btn btn-add">+ أضف لقائمتي</button>
      </div>
    </div>
  </div>
  <div class="section">
    <h3>المسلسلات</h3>
    <div class="horizontal" id="seriesRow"></div>
  </div>
  `;

  const row=document.getElementById("seriesRow");
  allSeries.forEach(s=>{
    row.innerHTML+=`
    <div class="card" onclick="openSeries('${s._id}')">
      <img src="${s.image}">
    </div>`;
  });
}

function openSeries(id){
  const s=allSeries.find(x=>x._id===id);
  if(!s)return;

  document.getElementById("homeContent").style.display="none";
  const page=document.getElementById("seriesPage");
  page.style.display="block";
  page.innerHTML="";

  currentEpisodes=s.episodes||[];

  currentEpisodes.forEach((ep,i)=>{
    page.innerHTML+=`
    <div class="episode-box">
      <div class="episode-image">
        <img src="${ep.image||s.image}">
        <div class="play-btn" onclick="playEpisode(${i})">▶</div>
      </div>
      <div class="episode-info">
        <div class="episode-title">الحلقة ${i+1}</div>
        <div class="episode-desc">${ep.name||""}</div>
      </div>
    </div>`;
  });
}

function playEpisode(i){
  const ep=currentEpisodes[i];
  if(ep.isLocked && !isSubscribed){
    alert("هذه الحلقة متاحة للمشتركين فقط 🔒");
    return;
  }
  const url=ep.video;
  playerModal.style.display="flex";
  if(url.includes("mediadelivery")||url.includes("iframe")){
    auraVideo.style.display="none";
    auraFrame.style.display="block";
    auraFrame.src=url;
  }else{
    auraFrame.style.display="none";
    auraVideo.style.display="block";
    auraVideo.src=url;
    auraVideo.play();
  }
}

closePlayer.onclick=function(){
  auraVideo.pause();
  auraVideo.src="";
  auraFrame.src="";
  playerModal.style.display="none";
};

loadSeries();
</script>

</body>
</html>
