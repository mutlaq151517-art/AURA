<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA - لوحة التحكم</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#051423,#0a223d);
  color:white;
}

.header{
  padding:25px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  background:#081f3a;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 20px;
}

.card{
  background:#0f2c50;
  padding:25px;
  border-radius:18px;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#0c3a63;
  color:white;
}

input[type="file"]{
  background:#082a4a;
  padding:10px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  margin-top:5px;
}

.add-btn{ background:#00bfff; color:white; }
.delete-btn{ background:#ff3b3b; color:white; }
.edit-btn{ background:#ff9800; color:white; }

.series-box{
  background:#0b2a4a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

.series-title{
  font-size:18px;
  margin-bottom:10px;
  font-weight:bold;
}

.episodes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  margin-top:15px;
}

.episode-card{
  background:#0d3a63;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

.episode-card img{
  width:100%;
  height:110px;
  object-fit:cover;
  pointer-events:none; /* 🔥 هذا يمنع الصورة من تعطيل الزر */
}

.episode-info{
  padding:8px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:2; /* 🔥 يخلي الزر فوق الصورة */
}
</style>
</head>
<body>
