<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA - لوحة التحكم</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#051423,#0a223d);
  color:white;
}

.header{
  padding:25px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  background:#081f3a;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 20px;
}

.card{
  background:#0f2c50;
  padding:25px;
  border-radius:18px;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#0c3a63;
  color:white;
}

input[type="file"]{
  background:#082a4a;
  padding:10px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  margin-top:5px;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.add-btn{ background:#00bfff; color:white; }
.delete-btn{ background:#ff3b3b; color:white; }
.edit-btn{ background:#ff9800; color:white; }

.progress-container{
  width:100%;
  background:#082a4a;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

.progress-bar{
  height:10px;
  width:0%;
  background:#00bfff;
  border-radius:10px;
  transition:0.2s;
}

.progress-text{
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">🎬 لوحة تحكم AURA</div>

<div class="container">

<div class="card">
<h3>➕ إضافة مسلسل جديد</h3>
<input type="text" id="title" placeholder="اسم المسلسل">
<input type="text" id="image" placeholder="رابط صورة المسلسل">
<button class="add-btn" onclick="addSeries()">إضافة المسلسل</button>
</div>

<div class="card">
<h3>📺 إدارة المسلسلات</h3>
<div id="seriesList"></div>
</div>

</div>

<script>

const API_BASE = "https://aura-backend-mpvi.onrender.com";
const API = API_BASE + "/movies";

async function loadSeries(){
  const res = await fetch(API);
  const data = await res.json();
  const list = document.getElementById("seriesList");
  list.innerHTML="";

  data.forEach(series=>{

    list.innerHTML+=`
    <div style="background:#0b2a4a;padding:20px;border-radius:15px;margin-top:20px;">
      <div style="font-size:18px;margin-bottom:10px;font-weight:bold;">${series.title}</div>

      <h4>➕ إضافة حلقة</h4>
      <input type="text" placeholder="اسم الحلقة" id="epName-${series._id}">
      <input type="file" accept="video/*" id="epVideoFile-${series._id}">
      <input type="text" placeholder="رابط صورة الحلقة (مشهد)" id="epImage-${series._id}">
      <button class="add-btn" id="uploadBtn-${series._id}" onclick="addEpisode('${series._id}')">إضافة حلقة</button>

      <div class="progress-container" id="progressContainer-${series._id}">
        <div class="progress-bar" id="progressBar-${series._id}"></div>
        <div class="progress-text" id="progressText-${series._id}">0%</div>
      </div>
    </div>`;
  });
}

function addEpisode(id){

  const name = document.getElementById("epName-"+id).value;
  const fileInput = document.getElementById("epVideoFile-"+id);
  const image = document.getElementById("epImage-"+id).value;
  const button = document.getElementById("uploadBtn-"+id);

  const file = fileInput.files[0];
  if(!file){
    alert("اختر فيديو أولاً");
    return;
  }

  const progressContainer = document.getElementById("progressContainer-"+id);
  const progressBar = document.getElementById("progressBar-"+id);
  const progressText = document.getElementById("progressText-"+id);

  progressContainer.style.display="block";
  button.disabled = true;

  const formData = new FormData();
  formData.append("video", file);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", API_BASE + "/upload-video", true);

  xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
      let percent = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = percent + "%";
      progressText.innerText = percent + "%";
    }
  };

  xhr.onload = async function(){
    if(xhr.status === 200){

      const uploadData = JSON.parse(xhr.responseText);

      await fetch(API+"/"+id+"/episodes",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          name,
          video: uploadData.url,
          image
        })
      });

      progressText.innerText = "تم الرفع ✅";
      button.disabled = false;
      loadSeries();

    }else{
      alert("فشل رفع الفيديو");
      button.disabled = false;
    }
  };

  xhr.send(formData);
}

async function addSeries(){
  const title=document.getElementById("title").value;
  const image=document.getElementById("image").value;

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ title,image })
  });

  loadSeries();
}

loadSeries();

</script>

</body>
</html>
