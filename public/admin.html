<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA - لوحة التحكم</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#051423,#0a223d);
  color:white;
}
.header{
  padding:25px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  background:#081f3a;
}
.tabs{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0b223d;
}
.tab-btn{
  background:#0c3a63;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}
.tab-btn.active{ background:#00bfff; }

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 20px;
}
.card{
  background:#0f2c50;
  padding:25px;
  border-radius:18px;
  margin-bottom:30px;
}
input,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#0c3a63;
  color:white;
}
button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  margin-top:5px;
}
.add-btn{ background:#00bfff; color:white; }
.delete-btn{ background:#ff3b3b; color:white; }
.green-btn{ background:#00c853; color:white; }
.orange-btn{ background:#ff9800; color:white; }
.hidden{ display:none; }

.series-box{
  background:#0b2a4a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
.episodes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  margin-top:15px;
}
.episode-card{
  background:#0d3a63;
  border-radius:12px;
  padding:10px;
}
.schedule-box{
  background:#0c3a63;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.radio-group{
  display:flex;
  gap:15px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Aa10010010050555710";

if(!localStorage.getItem("admin_auth")){
  const pass = prompt("🔐 ادخل كلمة مرور لوحة التحكم:");
  if(pass !== ADMIN_PASSWORD){
    alert("كلمة المرور خطأ ❌");
    window.location.href="/";
  }else{
    localStorage.setItem("admin_auth","1");
  }
}
</script>

<div class="header">👑 لوحة تحكم AURA</div>

<div class="tabs">
  <div class="tab-btn active" onclick="showTab('seriesTab',this)">🎬 المسلسلات</div>
  <div class="tab-btn" onclick="showTab('usersTab',this)">👤 الحسابات</div>
</div>

<div class="container">

<div id="seriesTab">

<div class="card">
<h3>➕ إضافة مسلسل جديد</h3>
<input type="text" id="title" placeholder="اسم المسلسل">
<input type="text" id="image" placeholder="رابط صورة المسلسل">
<button class="add-btn" onclick="addSeries()">إضافة المسلسل</button>
</div>

<div class="card">
<h3>📺 إدارة المسلسلات</h3>
<div id="seriesList"></div>
</div>

</div>

<div id="usersTab" class="hidden">
<div class="card">
<h3>👤 إدارة الحسابات</h3>
<table style="width:100%; text-align:center;">
<thead>
<tr>
<th>المستخدم</th>
<th>الحالة</th>
<th>الانتهاء</th>
<th>اشتراك</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>
</div>

</div>

<script>

const API_BASE = "https://aura-backend-mpvi.onrender.com";
const API = API_BASE + "/movies";

function showTab(id,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("seriesTab").classList.add("hidden");
  document.getElementById("usersTab").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

async function loadSeries(){
  const res = await fetch(API);
  const data = await res.json();
  const list = document.getElementById("seriesList");
  list.innerHTML="";

  data.forEach(series=>{

    let episodesHTML="";

    if(series.episodes){
      episodesHTML += `<div class="episodes-grid">`;
      series.episodes.forEach(ep=>{
        episodesHTML+=`
        <div class="episode-card">
          <div>${ep.name}</div>
          <small>${ep.releaseDate ? 
          "📅 مجدولة: "+new Date(ep.releaseDate).toLocaleString() 
          : "⚡ الآن"}</small><br>
          <button class="${ep.isLocked?'delete-btn':'green-btn'}"
          onclick="toggleLock('${series._id}','${ep._id}',${!ep.isLocked})">
          ${ep.isLocked?'🔒 مقفلة':'🔓 مفتوحة'}
          </button>
          <button class="delete-btn"
          onclick="deleteEpisode('${series._id}','${ep._id}')">
          حذف
          </button>
        </div>`;
      });
      episodesHTML += `</div>`;
    }

    list.innerHTML+=`
    <div class="series-box">
      <h4>${series.title}</h4>
      <button class="delete-btn"
      onclick="deleteSeries('${series._id}')">
      حذف المسلسل
      </button>
      <hr>

      <input type="text" id="epName-${series._id}" placeholder="اسم الحلقة">
      <input type="text" id="epVideo-${series._id}" placeholder="رابط الحلقة">
      <input type="text" id="epImage-${series._id}" placeholder="رابط صورة الحلقة">

      <div class="schedule-box">
        <div class="radio-group">
          <label>
            <input type="radio" name="schedule-${series._id}" value="now" checked>
            الآن
          </label>
          <label>
            <input type="radio" name="schedule-${series._id}" value="scheduled">
            مجدولة
          </label>
        </div>

        <input type="datetime-local"
        id="release-${series._id}"
        class="hidden">
      </div>

      <button class="add-btn"
      onclick="addEpisode('${series._id}')">
      إضافة حلقة
      </button>

      ${episodesHTML}
    </div>`;
  });

  document.querySelectorAll("input[type=radio]").forEach(r=>{
    r.addEventListener("change",function(){
      const id=this.name.split("-")[1];
      const input=document.getElementById("release-"+id);
      if(this.value==="scheduled"){
        input.classList.remove("hidden");
      }else{
        input.classList.add("hidden");
      }
    });
  });
}

async function addEpisode(id){
  const name=document.getElementById("epName-"+id).value;
  const video=document.getElementById("epVideo-"+id).value;
  const image=document.getElementById("epImage-"+id).value;

  const scheduleType=document.querySelector(`input[name="schedule-${id}"]:checked`).value;
  const releaseInput=document.getElementById("release-"+id);

  let releaseDate=null;
  if(scheduleType==="scheduled" && releaseInput.value){
    releaseDate=releaseInput.value;
  }

  await fetch(API+"/"+id+"/episodes",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ name,video,image,releaseDate })
  });

  loadSeries();
}

async function deleteSeries(id){
  if(!confirm("متأكد من حذف المسلسل؟")) return;
  await fetch(API+"/"+id,{ method:"DELETE" });
  loadSeries();
}

async function deleteEpisode(seriesId,episodeId){
  if(!confirm("متأكد من حذف الحلقة؟")) return;
  await fetch(API+"/"+seriesId+"/episodes/"+episodeId,{ method:"DELETE" });
  loadSeries();
}

async function toggleLock(movieId,episodeId,isLocked){
  await fetch(API_BASE+"/admin/toggle-episode-lock",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ movieId,episodeId,isLocked })
  });
  loadSeries();
}

async function addSeries(){
  const title=document.getElementById("title").value;
  const image=document.getElementById("image").value;
  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ title,image })
  });
  loadSeries();
}

loadSeries();

</script>

</body>
</html>
