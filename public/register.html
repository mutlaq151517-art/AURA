<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب - AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

body::before{
  content:"🌙 ✨ 🏮 ✨ 🌙";
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  font-size:38px;
  opacity:0.07;
}

.register-box{
  width:90%;
  max-width:400px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 25px rgba(0,191,255,0.3);
}

h2{
  text-align:center;
  margin-bottom:25px;
  text-shadow:0 0 10px rgba(0,191,255,0.8);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00bfff;
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#009acd;
}

.login-link{
  margin-top:15px;
  text-align:center;
  font-size:13px;
}

.login-link a{
  color:#00bfff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="register-box">
  <h2>إنشاء حساب جديد</h2>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="register()">إنشاء حساب</button>

  <div class="login-link">
    عندك حساب؟ 
    <a href="login.html">تسجيل الدخول</a>
  </div>
</div>

<script>
const API = "https://aura-backend-mpvi.onrender.com";

async function register(){
  const username=document.getElementById("username").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !email || !password){
    alert("الرجاء تعبئة جميع الحقول");
    return;
  }

  if(password.length < 6){
    alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
    return;
  }

  try{
    const res=await fetch(API + "/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,email,password})
    });

    const data=await res.json();

    if(res.ok){
      alert("تم إنشاء الحساب بنجاح ✅");
      window.location.href="login.html";
    }else{
      alert(data.message || "خطأ في إنشاء الحساب");
    }

  }catch(err){
    alert("تعذر الاتصال بالسيرفر");
  }
}
</script>

</body>
</html>
