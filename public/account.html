<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحساب - AURA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#0b1f38;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00d2a5;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>👤 حسابي</h2>
  <p id="username">جاري التحميل...</p>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<script>
const API = "https://aura-backend-mpvi.onrender.com";
const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

fetch(API + "/me",{
  headers:{ Authorization: token }
})
.then(res=>res.json())
.then(data=>{
  document.getElementById("username").innerText = data.username;
})
.catch(()=>{
  document.getElementById("username").innerText = "حدث خطأ";
});

function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}
</script>

</body>
</html>
