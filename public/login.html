<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - AURA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#06121f,#0b1f38,#071a2f);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

body::before{
  content:"🌙 ✨ 🏮 ✨ 🌙";
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  font-size:38px;
  opacity:0.07;
}

.login-box{
  width:90%;
  max-width:400px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 25px rgba(0,191,255,0.3);
}

h2{
  text-align:center;
  margin-bottom:25px;
  text-shadow:0 0 10px rgba(0,191,255,0.8);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00bfff;
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#009acd;
}

.register-link{
  margin-top:15px;
  text-align:center;
  font-size:13px;
}

.register-link a{
  color:#00bfff;
  text-decoration:none;
}

.forgot{
  text-align:left;
  font-size:13px;
  margin-bottom:10px;
  cursor:pointer;
  color:#00bfff;
}

.forgot:hover{
  text-decoration:underline;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  width:90%;
  max-width:350px;
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 25px rgba(0,191,255,0.5);
  text-align:center;
}

.modal-content h3{
  margin-bottom:15px;
}

.close-btn{
  margin-top:10px;
  background:#ff3b3b;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>تسجيل الدخول</h2>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">

  <div class="forgot" onclick="openModal()">نسيت كلمة السر؟</div>

  <button onclick="login()">دخول</button>

  <div class="register-link">
    ما عندك حساب؟ 
    <a href="register.html">إنشاء حساب</a>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal" id="forgotModal">
  <div class="modal-content">
    <h3>استرجاع كلمة السر</h3>
    <input type="email" id="forgotEmail" placeholder="ادخل بريدك الإلكتروني">
    <button onclick="sendReset()">إرسال الرابط</button>
    <button class="close-btn" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script>
const API = "https://aura-backend-mpvi.onrender.com";

async function login(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("يرجى إدخال جميع البيانات");
    return;
  }

  try{
    const res=await fetch(API + "/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    });

    const data=await res.json();

    if(res.ok && data.token){
      localStorage.setItem("token",data.token);
      window.location.href="index.html";
    }else{
      alert(data.message || "خطأ في تسجيل الدخول");
    }

  }catch(err){
    alert("تعذر الاتصال بالسيرفر");
  }
}

function openModal(){
  document.getElementById("forgotModal").style.display="flex";
}

function closeModal(){
  document.getElementById("forgotModal").style.display="none";
}

function sendReset(){
  alert("ميزة استرجاع كلمة المرور غير مفعلة حالياً");
}
</script>

</body>
</html>
